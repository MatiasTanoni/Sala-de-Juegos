<div
  class="w-full max-w-3xl mx-auto flex flex-col h-[70vh] bg-gray-900 text-white border-2 border-gray-800 rounded-lg shadow-lg">

  <div class="p-4 border-b border-gray-800 flex items-center justify-between bg-gray-950 rounded-t-lg">
    <h2 class="text-xl font-semibold text-red-600">💬 Chat en tiempo real</h2>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-3">
    @for (msj of mensajes(); track $index) {
    <div class="flex" [class.justify-end]="msj.usuario === usuario" [class.justify-start]="msj.usuario !== usuario">
      <div class="max-w-xs p-3 rounded-2xl shadow-md" [class.bg-red-600]="msj.usuario === usuario"
        [class.bg-gray-800]="msj.usuario !== usuario">
        <p class="text-xs text-gray-300 mb-1">
          {{ msj.usuario }} ·
          <span class="opacity-75">{{ msj.created_at | date:'dd/MM/yyyy HH:mm' }}</span>
        </p>
        <p class="text-sm">{{ msj.mensaje }}</p>
      </div>
    </div>
    }
  </div>

  <div class="px-4 py-3 border-t border-gray-800 bg-gray-950 flex items-center space-x-2">
    <input [(ngModel)]="msj" (keyup.enter)="enviarMensaje()" placeholder="Escribe un mensaje..."
      class="flex-1 px-3 py-2 rounded-md bg-gray-800 text-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
    <button (click)="enviarMensaje()"
      class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-medium transition">
      Enviar
    </button>
  </div>
</div>
