<div
    class="bg-gradient-to-br bg-gray-900 rounded-2xl shadow-2xl flex flex-col h-[85vh] sm:h-[80vh] md:h-[75vh] lg:h-[70vh] w-[95vw] sm:w-[80vw] md:w-[70vw] lg:w-[60vw] relative p-6 border-2 border-gray-800">

    @if (!loading && results.length > 0) {
    <div class="overflow-x-auto rounded-lg shadow-inner">
        <table class="min-w-full divide-y divide-gray-700 border border-gray-600 rounded-lg overflow-hidden text-left">
            <thead class="bg-gray-700">
                <tr class="text-red-600 uppercase tracking-wider">
                    <th class="px-6 py-3">Nombre</th>
                    <th class="px-6 py-3">Apellido</th>
                    <th class="px-6 py-3">Puntuación</th>
                    <th class="px-6 py-3">Victoria</th>
                    <th class="px-6 py-3 ">Juego</th>
                </tr>
            </thead>
            <tbody class="bg-gray-800 divide-y divide-gray-700 text-gray-100">
                @for (item of results; track $index) {
                <tr class="hover:bg-gray-700 transition-colors duration-200">
                    <td class="px-6 py-4">{{ item.firstname }}</td>
                    <td class="px-6 py-4">{{ item.lastname }}</td>
                    <td class="px-6 py-4">{{ item.score }}</td>
                    <td class="px-6 py-4">
                        {{ item.victory ? '✅' : '❌' }}
                    </td>
                    <td class="px-6 py-4"> {{ item.game.name}}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    }
    @else {
    <app-spinner></app-spinner>
    }
</div>
