<form class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl w-full max-w-sm text-gray-100">
    <div class="flex justify-center mb-6">
        <img src="icono.png" alt="Icono" class="h-22 w-22" />
    </div>

    <h1 class="text-3xl font-extrabold text-center mb-8 tracking-wide text-red-500">
        Login
    </h1>

    <div class="mb-5">
        <label for="email" class="block text-sm font-medium mb-2 text-gray-400">Correo electrónico</label>
        <input id="email" type="email" placeholder="ejemplo@correo.com" class="w-full px-4 py-3 rounded-xl border border-gray-700 bg-gray-800 text-gray-100
        placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition" />
    </div>

    <div class="mb-6">
        <label for="password" class="block text-sm font-medium mb-2 text-gray-400">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-700 bg-gray-800 text-gray-100
        placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition" />
    </div>

    <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg 
      transition-all duration-200 transform hover:scale-[1.03] hover:shadow-red-500/40">
        Ingresar
    </button>
</form>
