<form [formGroup]="formularioLogin" (ngSubmit)="onLogin()"
    class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl w-full max-w-sm text-gray-100">

    <div class="flex justify-center mb-6">
        <img src="icono.png" alt="Icono" class="h-22 w-22" />
    </div>

    <h1 class="text-3xl font-extrabold text-center mb-8 tracking-wide text-red-700">
        Login
    </h1>

    <div class="mb-5">
        <label for="email" class="block text-sm font-medium mb-2 text-gray-400">Correo electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="ejemplo@correo.com" class="w-full px-4 py-3 rounded-xl border border-gray-700 bg-gray-800 text-gray-100
        placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-700 focus:border-transparent transition" />
        @if (formularioLogin.get('email')?.invalid && formularioLogin.get('email')?.touched) {
        <div class="text-red-500 text-sm mt-1">Ingresa un correo válido.</div>
        }
    </div>

    <div class="mb-6">
        <label for="password" class="block text-sm font-medium mb-2 text-gray-400">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-700 bg-gray-800 text-gray-100
        placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-700 focus:border-transparent transition" />
        @if (formularioLogin.get('password')?.invalid && formularioLogin.get('password')?.touched) {
        <div class="text-red-500 text-sm mt-1">La contraseña es obligatoria.</div>
        }
    </div>

    <button type="submit" [disabled]="formularioLogin.invalid" class="w-full bg-red-700 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg 
      transition-all duration-200 transform hover:scale-[1.03] hover:shadow-red-500/40">
        Ingresar
    </button>
</form>
