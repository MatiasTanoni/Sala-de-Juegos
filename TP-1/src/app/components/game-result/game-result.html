<div class="fixed inset-0 flex items-center justify-center bg-black/50 z-50 backdrop-blur-sm">
    <div
        class="bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-sm text-center transform transition-all scale-95 hover:scale-100">
        <h2 class="text-lg mb-4">
            {{ isVictory ? 'Has ganado.' : 'Has perdido.' }}
        </h2>

        <p class="text-lg font-medium mb-4">
            Puntuación lograda: {{ score }}. {{ message }}
        </p>

        <!-- Botones -->
        <div class="flex flex-col sm:flex-row gap-2 justify-center">
            @if(!resume){
            <button (click)="navigateToHome()"
                class="bg-transparent text-white border-2 border-white py-2 px-4 rounded-full hover:bg-white hover:text-gray-800 transition-colors duration-300 w-full sm:w-auto">
                Ir al Home
            </button>
            }

            @if(resume){
            <ng-container>
                <button (click)="onClose()"
                    class="bg-transparent text-white border-2 border-white py-2 px-4 rounded-full hover:bg-white hover:text-gray-800 transition-colors duration-300 w-full sm:w-auto">
                    Seguir jugando
                </button>

                <button (click)="onEndGame()"
                    class="bg-transparent text-white border-2 border-white py-2 px-4 rounded-full hover:bg-white hover:text-gray-800 transition-colors duration-300 w-full sm:w-auto">
                    Terminar juego
                </button>
            </ng-container>
            }
        </div>

    </div>
</div>
