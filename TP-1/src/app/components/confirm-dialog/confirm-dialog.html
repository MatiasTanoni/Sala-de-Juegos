<div class="fixed inset-0 flex items-center justify-center bg-black/50 z-50 backdrop-blur-sm">
    <div
        class="bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-sm text-center transform transition-all scale-95 hover:scale-100 duration-300">
        <!-- Icono -->
        @if(icon){
        <div class="text-5xl mb-4">{{ icon }}</div>
        }

        <!-- Título -->
        <h2 class="text-2xl font-bold mb-2 text-white">{{ title }}</h2>

        <!-- Mensaje -->
        <p class="text-gray-300 mb-6">{{ message }}</p>

        <!-- Botones -->
        <div class="flex justify-center gap-4">
            <!-- Botón Confirmar -->
            <button (click)="onConfirm()"
                class="px-4 py-2 bg-red-600 text-white rounded-lg transition cursor-pointer shadow-md hover:bg-red-700">
                {{ confirmText }}
            </button>

            <!-- Botón Cancelar -->
            <button (click)="onCancel()"
                class="px-4 py-2 bg-gray-600 text-gray-200 rounded-lg transition cursor-pointer shadow-md hover:bg-gray-500">
                {{ cancelText }}
            </button>
        </div>
    </div>
</div>
